portfolio:
  - item: Gielinor Dailies
    description: "Gielinor Dailies is a daily co-pilot for Old School RuneScape. Plan smarter, play better — track your characters, manage daily tasks, access calculators, guides, and tools all in one place. Includes a RuneLite plugin for in-game task tracking."
    url: "https://www.gielinordailies.com"
    slides:
      - image: "assets/uploads/gielinor-landing.png"
      - image: "assets/uploads/gielinor-dashboard.png"
      - image: "assets/uploads/gielinor-planner.png"
      - image: "assets/uploads/gielinor-tools.png"
      - image: "assets/uploads/gielinor-character.png"
      - image: "assets/uploads/gielinor-plugin.png"

  - item: Noctis
    description: "Noctis is a minimalist, dark-themed Jekyll theme with responsive design, tag and category support, light/dark mode toggle, and multiple color schemes. The theme powering nativvstudios.com."
    url: "https://github.com/nativvstudios/Noctis"
    slides:
      - image: "assets/uploads/noctis-desktop.png"
      - image: "assets/uploads/noctis-mobile.png"
      - image: "assets/uploads/noctis-showcase.gif"

  - item: Zen Search
    description: "Zen Search is a minimalist Chrome extension that replaces your new tab with a clean dark homepage featuring a clock, pinned shortcuts, and instant search. Includes a Spotlight-style overlay (Ctrl+Shift+Space) to search tabs, history, and the web without leaving your current page."
    url: "https://github.com/nativvstudios/Zen-search"
    slides:
      - image: "assets/uploads/zensearch-newtab.png"
      - image: "assets/uploads/zensearch-suggestions.png"
      - image: "assets/uploads/zensearch-spotlight.png"
      - image: "assets/uploads/zensearch-panel.png"
      - image: "assets/uploads/zensearch-settings.png"

  - item: nUtilities
    description: "A collection of Unity Editor utilities to boost your productivity. Features nSearch (fuzzy search), Scene Organizer, Favorites bookmarking, and Hierarchy Organizer to streamline your Unity workflow."
    url: "https://github.com/nativvstudios/com.nutilities.editor"
    slides:
      - image: "assets/uploads/scenemanager.gif"
      - image: "assets/uploads/nsearch.gif"

  - item: From Ether
    description: "From Ether is a captivating story-driven 2D pixel art RPG where you discover your origins from the mythical element of creation, Ether. Guided by the Ether, you realize your destined role in this timeline: to overcome the encroaching evil. Unravel the mysteries of your existence and fulfill your purpose in a beautifully crafted world, blending compelling narrative and nostalgic visuals."
    url: ""
    slides:
      - image: "assets/uploads/FromEtherLogo.png"

# for atom feed
author:
  name: "Whyherro"
  email: whyherro@nativvstudios.com

disqus:
  # Leave shortname blank to disable comments site-wide.
  # Disable comments for any post by adding `comments: false` to that post's YAML Front Matter.
  shortname: "nativvstudios"

plugins:
  - jemoji
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

collections_dir: all_collections
collections:
  posts:
    output: true

jekyll_compose:
  default_front_matter:
    drafts:
      layout: post
      categories:
      comments: true
    posts:
      layout: post
      categories:
      comments: true

defaults:
  - scope:
      path: "_posts"
    values:
      layout: "post"
      permalink: /posts/:title/
# exclude: ["sitemap.xml", "feed.xml", "LICENSE", "README.md"]
