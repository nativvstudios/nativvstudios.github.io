<section class="bio">
  <div>
    <a href="https://github.com/nativvstudios/nativvstudios.github.io" title="This blog is open source!">
      <img src="{{site.data.author.dp}}" alt="" class="bio-avatar" />
    </a>
  </div>
  <div>
    <div class="bio-content">{{site.data.author.description}}</div>
    <div class="bio-social">
      {% for i in site.data.author.contact %}
      <a href="{{i.url}}" target="_blank">
        <i class="fa-brands fa-{{i.title}} fa-lg"></i>
      </a>
      {%endfor%}

      {% if site.data.author.contact[3].title == "email" %}
        <a href="{{ site.data.author.contact[3].url }}" target="_blank">
          <i class="fa-solid fa-envelope fa-lg"></i>
        </a>
      {%endif%}

      {% if site.linklist != "" %}
        <a href="/links.html">
          <i class="fa-solid fa-link fa-lg"></i>
        </a>
      {% endif %}
    </div>
    {% include navbar.html %}
  </div>
</section>
